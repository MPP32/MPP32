name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — install & generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: backend
        run: bun install

      - name: Generate Prisma client
        working-directory: backend
        env:
          DATABASE_URL: "file:./prisma/dev.db"
        run: bunx prisma generate

      - name: Typecheck
        working-directory: backend
        env:
          DATABASE_URL: "file:./prisma/dev.db"
        run: bun run typecheck

  frontend:
    name: Frontend — install & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: webapp
        run: bun install

      - name: Build
        working-directory: webapp
        env:
          VITE_BACKEND_URL: ""
        run: bun run build
