name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — dependencies & schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: backend
        run: bun install

      - name: Validate Prisma schema
        working-directory: backend
        env:
          DATABASE_URL: "file:./prisma/dev.db"
        run: bunx prisma validate && bunx prisma generate

  frontend:
    name: Frontend — dependencies & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: webapp
        run: bun install

      - name: Check TypeScript (non-blocking)
        working-directory: webapp
        run: bun x tsc --noEmit --project tsconfig.app.json || true
        # Full build requires platform environment — type errors are surfaced here for review
